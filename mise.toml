[tools]
tuist = "latest"

[env]
SENTRY_DISABLED = "true"

[tasks.archive]
run = ["""tuist xcodebuild \
-project Walletify.xcodeproj \
-scheme 'Walletify Release' \
-configuration Release \
-destination 'generic/platform=iOS' \
-archivePath .archives/Walletify \
clean archive""", "tuist inspect bundle .archives/Walletify.xcarchive"]
description = "Creates an archive of the app for distribution"
sources = ["Walletify/**/*", "Walletify.xcodeproj/**/*", "ExportOptions.plist", "Tuist.swift"]
outputs = [".archives/Walletify.xcarchive"]

[tasks.create-ipa]
run = """xcodebuild \
  -exportArchive \
  -archivePath .archives/Walletify.xcarchive \
  -exportOptionsPlist ./ExportOptions.plist \
  -exportPath .archives/export
"""
description = "Creates an IPA file from the archive for distribution"
depends = ["archive"]
outputs = [".archives/export/**/*"]

[tasks.release]
run = "tuist share .archives/export/Walletify.ipa"
description = "Creates a Tuist preview for the latest release build"
depends = ["create-ipa"]

[tasks."tuist:web"]
run = "tuist project show --web"
description = "Opens the Tuist web page for the project"
